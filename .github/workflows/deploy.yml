# Kairos CI/CD — deploys the backend to Cloud Run and the frontend to
# Firebase Hosting on every push to main.
#
# Required repository secrets (Settings → Secrets → Actions):
#   GCP_PROJECT_ID        your Google Cloud project ID
#   GCP_SA_KEY            JSON key for a service account with
#                         Cloud Run Admin + Artifact Registry Writer +
#                         Service Account User roles
#   OPENROUTER_API_KEY    for the deployed backend (AI chat + result explainer)
#   FIREBASE_SA_KEY       JSON key for Firebase Hosting deploys
#   VITE_MAPBOX_TOKEN     baked into the frontend build
#   VITE_API_BASE_URL     the Cloud Run URL after first deploy

name: Deploy Kairos

on:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Ensure the Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe kairos \
            --location=us-central1 \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            || gcloud artifacts repositories create kairos \
            --repository-format=docker \
            --location=us-central1 \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --description="Kairos backend container images" \
            --quiet

      - name: Build and push image
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/kairos/api:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy kairos-api \
            --image $IMAGE \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 300 \
            --set-env-vars GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        working-directory: frontend
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SA_KEY }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
          entryPoint: frontend
